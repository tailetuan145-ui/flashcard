<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards của tôi</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: transparent; /* Để đồng nhất với nền Google Sites */
    font-family: Arial, sans-serif;
    margin: 0;
  }
  .scene {
    width: 300px;
    height: 200px;
    perspective: 600px; /* Tạo hiệu ứng 3D */
  }
  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border-radius: 10px;
  }
  /* Hiệu ứng lật khi click */
  .card.is-flipped {
    transform: rotateY(180deg);
  }
  .card__face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    font-weight: bold;
    border-radius: 10px;
  }
  /* Mặt trước */
  .card__face--front {
    background: white;
    color: #333;
    border: 2px solid #e0e0e0;
  }
  /* Mặt sau */
  .card__face--back {
    background: #4285f4;
    color: white;
    transform: rotateY(180deg);
  }
</style>
</head>
<body>

<div class="scene">
  <div class="card" onclick="this.classList.toggle('is-flipped')">
    <div class="card__face card__face--front">Apple</div>
    <div class="card__face card__face--back">Quả táo</div>
  </div>
</div>

</body>
</html>
