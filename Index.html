<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards theo Unit</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: transparent;
    font-family: Arial, sans-serif;
    margin: 0;
  }
  /* Bộ chọn Unit */
  .selector-container {
    margin-bottom: 20px;
  }
  select {
    padding: 8px 15px;
    font-size: 16px;
    border-radius: 5px;
    border: 1px solid #ccc;
    cursor: pointer;
  }
  .scene {
    width: 300px;
    height: 400px; 
    perspective: 600px;
  }
  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
  }
  .card.is-flipped {
    transform: rotateY(180deg);
  }
  .card__face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    border: 1px solid #ddd;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    color: #666;
  }
  .card__face img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .card__face--back {
    transform: rotateY(180deg);
  }
</style>
</head>
<body>

<div class="selector-container">
  <label for="unit-select">Chọn bài học: </label>
  <select id="unit-select" onchange="changeUnit(this.value)">
    <option value="1">Unit 1 (Chưa cập nhật)</option>
    <option value="2" selected>Unit 2 (Đang xem)</option> <option value="3">Unit 3 (Chưa cập nhật)</option>
    </select>
</div>

<div class="scene">
  <div class="card" id="flashcard" onclick="this.classList.toggle('is-flipped')">
    <div class="card__face card__face--front">
      <img id="img-front" src="u2-truoc.jpg" alt="Mặt trước">
    </div>
    <div class="card__face card__face--back">
      <img id="img-sau" src="u2-sau.jpg" alt="Mặt sau">
    </div>
  </div>
</div>

<script>
  // Cấu hình đường dẫn ảnh cho từng Unit tại đây
  const unitData = {
    "1": { front: "u1-truoc.jpg", back: "u1-sau.jpg", placeholder: "Nội dung Unit 1 chưa sẵn sàng" },
    "2": { front: "u2-truoc.jpg", back: "u2-sau.jpg", placeholder: "" },
    "3": { front: "u3-truoc.jpg", back: "u3-sau.jpg", placeholder: "Nội dung Unit 3 chưa sẵn sàng" }
    // Khi nào có Unit mới, bạn chỉ cần thêm dòng vào đây. Ví dụ: "4": { front: "u4-truoc.jpg", back: "u4-sau.jpg" }
  };

  function changeUnit(unitNumber) {
    const card = document.getElementById('flashcard');
    const imgFront = document.getElementById('img-front');
    const imgSau = document.getElementById('img-sau');
    
    // Trở về mặt trước trước khi đổi ảnh
    card.classList.remove('is-flipped');
    
    // Đợi hiệu ứng lật ẩn đi rồi mới đổi ảnh (khoảng 0.3s)
    setTimeout(() => {
      const data = unitData[unitNumber];
      
      if(data && data.placeholder === "") {
        // Nếu đã có ảnh cho Unit đó
        imgFront.parentElement.innerHTML = `<img id="img-front" src="${data.front}" alt="Mặt trước">`;
        imgSau.parentElement.innerHTML = `<img id="img-sau" src="${data.back}" alt="Mặt sau">`;
      } else {
        // Nếu chưa có ảnh (Unit chưa cập nhật)
        imgFront.parentElement.innerHTML = `<div style="padding:20px; text-align:center;">${data ? data.placeholder : 'Chưa có dữ liệu'}</div>`;
        imgSau.parentElement.innerHTML = `<div style="padding:20px; text-align:center;">Vui lòng quay lại sau!</div>`;
      }
    }, 300);
  }
</script>

</body>
</html>
